# Spend Categorization Configuration
# Three modules: generate, categorize, app

# =============================================================================
# GENERATE - Data generation (0_generate.ipynb)
# Creates: invoices_raw -> invoices (with LLM descriptions)
# =============================================================================
generate:
  company:
    name: Borealis Wind Systems
    industry: Wind turbine manufacturing
    categories_file: assets/categories.csv
    cost_centres:
      - CC-100-Production
      - CC-200-Maintenance
      - CC-300-Engineering
      - CC-400-IT
      - CC-500-Sales
      - CC-600-HR
      - CC-700-Logistics
      - CC-800-Admin
      - CC-900-Projects
    plants:
      - name: US-East Plant
        id: PLANT-US-E
        region: North America
        country: USA
      - name: US-West Plant
        id: PLANT-US-W
        region: North America
        country: USA
      - name: Germany-North
        id: PLANT-DE-N
        region: Europe
        country: Germany
      - name: Germany-South
        id: PLANT-DE-S
        region: Europe
        country: Germany
      - name: Vietnam Plant
        id: PLANT-VN
        region: Asia
        country: Vietnam
      - name: Brazil Plant
        id: PLANT-BR
        region: South America
        country: Brazil
  tables:
    invoices_raw: invoices_raw
    invoices: invoices
    categories: categories
    categories_str: categories_str
  data:
    catalog: shm
    schema: spend
    small_llm_endpoint: databricks-gpt-oss-20b
    large_llm_endpoint: databricks-claude-sonnet-4-5
    rows: 5000
    start: 2024-01-01
    end: 2025-12-31
    distribution:
      Direct: 0.6
      Indirect: 0.35
      Non-Procureable: 0.05
    python_columns:
      - date
      - order_id
      - category_level_1
      - category_level_2
      - category_level_3
      - cost_centre
      - plant
      - plant_id
      - region
      - amount
      - unit_price
      - total
    llm_columns:
      - supplier
      - supplier_country
      - description
    prompt: |
      Generate these fields based on the provided information:
      - description (max 15 words, realistic for category)
      - supplier (real company name, match category type and region)
      - supplier_country (ISO country code)

      Return a JSON object with supplier, supplier_country, and description.

      Invoice Information:

# =============================================================================
# CATEGORIZE - Categorization models (2_bootstrap, 3_optimize, 4_catboost, 5_vectorsearch)
# Uses catalog/schema from generate section
# Data flow: invoices -> cat_bootstrap (LLM) -> cat_reviews (human) -> cat_catboost/cat_vectorsearch (trained models) -> cat_reviews (feedback loop)
# =============================================================================
categorize:
  # Delta tables for categorization
  tables:
    prompts: prompts
    cat_bootstrap: cat_bootstrap
    cat_catboost: cat_catboost
    cat_vectorsearch: cat_vectorsearch 
    cat_reviews: cat_reviews

app:
  page_size: 50
  default_user: user
  categorization_source: catboost # bootstrap | catboost | vectorsearch

  # Lakebase PostgreSQL connection
  lakebase_instance: spend-categorization
  lakebase_dbname: databricks_postgres

  # Column mappings -- change these to point at a different dataset
  columns:
    id: order_id             # primary key / join column
    date: date               # date column for time series
    description: description # text description for search
    supplier: supplier       # vendor / supplier name
    amount: total            # spend amount (used for aggregation)
    category_l1: category_level_1
    category_l2: category_level_2
    category_l3: category_level_3
    region: region           # geographic region
    pred_l1: pred_level_1
    pred_l2: pred_level_2
    pred_l3: pred_level_3
    actual_l1: actual_level_1
    actual_l2: actual_level_2
    actual_l3: actual_level_3
    confidence: confidence

  # Tables loaded into the app at startup
  # label -> {table: <table_name_in_schema>, description: <human label>}
  tables:
    invoices:
      table: invoices
      description: Source invoices
    categories:
      table: categories
      description: Category hierarchy
    cat_bootstrap:
      table: cat_bootstrap
      description: LLM bootstrap predictions
    cat_catboost:
      table: cat_catboost
      description: CatBoost predictions
    cat_vectorsearch:
      table: cat_vectorsearch
      description: Vector search predictions
    cat_reviews:
      table: cat_reviews
      description: Human review corrections
      native: true  # not a synced table

  search:
    max_results: 500

  flagging:
    low_confidence_threshold: 3.5
    critical_confidence_threshold: 2.5
