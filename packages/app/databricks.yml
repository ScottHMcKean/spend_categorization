bundle:
  name: "spend-app"

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  database_instances:
    spend-app-db:
      name: "spend-app"
      capacity: "CU_1"
  apps:
    spend-app-app:
      name: "spend-app"
      description: "spend-app created with apx"
      source_code_path: ./.build
      resources:
        - name: "db"
          database:
            database_name: "databricks_postgres"
            instance_name: ${resources.database_instances.spend-app-db.name}
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
