resources:
  jobs:
    spend_categorization_pipeline:
      name: "[${bundle.target}] Spend Categorization Pipeline"

      parameters:
        - name: catalog
          default: ${var.catalog}
        - name: schema
          default: ${var.schema}
        - name: llm_endpoint
          default: ${var.llm_endpoint}
        - name: batch_size
          default: "1000"
        - name: max_batches
          default: "100"
        - name: review_schema
          default: "three_level"
        - name: review_source
          default: "ai_classify"
        - name: low_confidence_threshold
          default: "0.6"
        - name: review_sample_size
          default: "20"
        - name: train_schema
          default: "three_level"
        - name: train_source
          default: "ai_classify"
        - name: run_catboost
          default: "true"
        - name: also_run_tsvector
          default: "false"
        - name: limit_rows
          default: "0"

      tasks:
        - task_key: define_taxonomies
          notebook_task:
            notebook_path: ../notebooks/0_define_taxonomies.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
            source: WORKSPACE
          environment_key: default

        - task_key: ingest
          depends_on:
            - task_key: define_taxonomies
          notebook_task:
            notebook_path: ../notebooks/1_ingest.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              llm_endpoint: "{{job.parameters.llm_endpoint}}"
              batch_size: "{{job.parameters.batch_size}}"
              max_batches: "{{job.parameters.max_batches}}"
            source: WORKSPACE
          environment_key: default

        - task_key: index_taxonomies
          depends_on:
            - task_key: define_taxonomies
          notebook_task:
            notebook_path: ../notebooks/2_index_taxonomies.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
            source: WORKSPACE
          environment_key: default

        - task_key: classify
          depends_on:
            - task_key: ingest
            - task_key: index_taxonomies
          notebook_task:
            notebook_path: ../notebooks/3_classify.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              llm_endpoint: "{{job.parameters.llm_endpoint}}"
              limit_rows: "{{job.parameters.limit_rows}}"
              also_run_tsvector: "{{job.parameters.also_run_tsvector}}"
            source: WORKSPACE
          environment_key: default

        - task_key: train_catboost
          depends_on:
            - task_key: classify
          notebook_task:
            notebook_path: ../notebooks/4_train_catboost.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              train_schema: "{{job.parameters.train_schema}}"
              train_source: "{{job.parameters.train_source}}"
              run_catboost: "{{job.parameters.run_catboost}}"
            source: WORKSPACE
          environment_key: default

        - task_key: review
          depends_on:
            - task_key: train_catboost
          notebook_task:
            notebook_path: ../notebooks/5_review.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
              llm_endpoint: "{{job.parameters.llm_endpoint}}"
              review_schema: "{{job.parameters.review_schema}}"
              review_source: "{{job.parameters.review_source}}"
              low_confidence_threshold: "{{job.parameters.low_confidence_threshold}}"
              sample_size: "{{job.parameters.review_sample_size}}"
            source: WORKSPACE
          environment_key: default

        - task_key: analytics
          depends_on:
            - task_key: review
          notebook_task:
            notebook_path: ../notebooks/6_analytics.ipynb
            base_parameters:
              catalog: "{{job.parameters.catalog}}"
              schema: "{{job.parameters.schema}}"
            source: WORKSPACE
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - pyyaml
              - openai
              - openpyxl
              - catboost
              - scikit-learn
              - pgvector
              - psycopg2-binary
              - "databricks-sdk>=0.50.0"
